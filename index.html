function render(){document.getElementById('sessionName').textContent=DATA.sessionId;document.getElementById('sessionMeta').textContent=(DATA.office||'')+' · '+((DATA.payPeriod||{}).from||'')+' - '+((DATA.payPeriod||{}).to||'');$('paid').textContent=money(DATA.officeTotals.paid);$('revenue').textContent=money(DATA.officeTotals.revenue);$('pl').textContent=money(DATA.officeTotals.pl);$('repCount').textContent=(DATA.reps||[]).length;const reps=(DATA.reps||[]).slice().sort((a,b)=>b.paid-a.paid);$('leaderRows').innerHTML=reps.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+esc(r.name)+'</td><td class="right money">'+money(r.paid)+'</td><td class="right money">'+money(r.revenue)+'</td><td class="right money">'+money(r.pl)+'</td><td class="right">'+((r.details||[]).length)+'</td></tr>').join('');$('repCards').innerHTML=reps.map((r,i)=>{const isInstaller=(r.details||[]).some(d=>d.source==='Installer Pay'||d.source==='Base Wage')&&!(r.details||[]).some(d=>d.source==='ORG DD'||(d.source||'').startsWith('Xfer'));const lineRows=(r.details||[]).map(d=>{const items=d.lineItems||[];if(items.length){return items.map((li,liIdx)=>{const isFirst=liIdx===0;return '<tr><td>'+(isFirst?esc(d.source||''):'')+'</td><td>'+(isFirst?esc(d.customer||''):'')+'</td><td>'+esc(li.saleDate||'')+'</td><td>'+esc(li.activationDate||'')+'</td><td>'+esc(li.category||'')+'</td><td class="desc">'+esc(li.description||'')+'</td><td>'+esc(li.details||'')+'</td><td>'+esc(li.status||'')+'</td><td class="right money '+(Number(li.amount||0)<0?'neg':Number(li.amount||0)>0?'pos':'')+'">'+money(li.amount||0)+'</td><td class="right money '+(Number(li.revenue||0)<0?'neg':Number(li.revenue||0)>0?'pos':'')+'">'+money(li.revenue||0)+'</td></tr>';}).join('');}return '<tr><td>'+esc(d.source||'')+'</td><td>'+esc(d.customer||'')+'</td><td>—</td><td>—</td><td>'+esc(d.type||'')+'</td><td class="desc">'+esc(d.description||'')+'</td><td>—</td><td>—</td><td class="right money '+(Number(d.amount||0)<0?'neg':Number(d.amount||0)>0?'pos':'')+'">'+money(d.amount||0)+'</td><td class="right money '+(Number(d.revenue||0)<0?'neg':Number(d.revenue||0)>0?'pos':'')+'">'+money(d.revenue||0)+'</td></tr>';}).join('')||'<tr><td colspan="10" class="dim">No line detail available.</td></tr>';return '<div class="rep-panel '+(isInstaller?'installer':r.pl>=0?'profit':'loss')+'"><div class="name">'+esc(r.name)+'</div><div class="paid money">'+money(r.paid)+'</div>'+(isInstaller?'<div class="dim" style="font-size:12px">Installer</div>':'<div class="revenue dim" style="font-size:12px">Revenue: <span class="money">'+money(r.revenue)+'</span></div><div class="pl"><div class="label dim" style="font-size:12px">P/L</div><div class="value money">'+money(r.pl)+'</div></div>')+'<details style="margin-top:10px"><summary style="cursor:pointer;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em">Line-by-line</summary><div style="overflow-x:auto;margin-top:8px"><table class="rep-line-table"><thead><tr><th>Source</th><th>Customer</th><th>Sale Date</th><th>Activation Date</th><th>Category</th><th>Description</th><th>Details</th><th>Status</th><th class="right">Paid</th><th class="right">Revenue</th></tr></thead><tbody>'+lineRows+'</tbody></table></div></details></div>';}).join('');$('installRowsFinal').innerHTML=(DATA.installs||[]).map(r=>'<tr><td>'+esc(r.installedBy)+'</td><td>'+esc(r.date)+'</td><td>'+esc(r.customer)+'</td><td>'+esc(r.salesRep)+'</td><td class="right">'+esc(r.int||0)+'</td><td class="right">'+esc(r.nl||0)+'</td><td class="right">'+esc(r.c2j||0)+'</td></tr>').join('')||'<tr><td colspan="7" class="dim">No installs.</td></tr>'}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===b));document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+b.dataset.page))}));
render();
})();</script></body></html>
