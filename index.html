<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NOVA Owner Final View</title><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>
:root{--bg:#0f1419;--card:#1a2129;--elev:#232c36;--border:#2d3843;--text:#e8eef5;--dim:#8b9aab;--accent:#d4a574;--green:#6ea97c}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}.app{max-width:1200px;margin:auto;padding:24px 18px}.brand h1{font-family:Oswald,sans-serif;text-transform:uppercase;font-size:38px;margin:0}.brand span{color:var(--accent)}.muted{color:var(--dim)}.header{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:20px}.tabs{display:flex;overflow:auto;border-bottom:1px solid var(--border);margin-bottom:20px}.tab{background:none;border:0;color:var(--dim);padding:12px 16px;font-family:Oswald,sans-serif;text-transform:uppercase;letter-spacing:.08em;cursor:pointer}.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}.page{display:none}.page.active{display:block}.card,.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}.card h3{font-family:Oswald,sans-serif;text-transform:uppercase;margin:0;padding:16px;border-bottom:1px solid var(--border)}.body{padding:16px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.stat{padding:14px}.label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}.value{font-family:Oswald,sans-serif;font-size:26px}.btn{background:var(--elev);border:1px solid #3d4a57;color:var(--text);border-radius:6px;padding:8px 13px;font-family:Oswald,sans-serif;text-transform:uppercase;letter-spacing:.08em;cursor:pointer}input{accent-color:var(--accent)}table{width:100%;border-collapse:collapse;font-size:13px}th{background:var(--elev);color:var(--dim);font-family:Oswald,sans-serif;text-transform:uppercase;text-align:left;padding:9px}td{border-bottom:1px solid var(--border);padding:9px}.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}.rep-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer}.rep-card:hover{border-color:var(--accent)}.rep-card .name{font-family:Oswald,sans-serif;text-transform:uppercase}.rep-card .pay{font-family:Oswald,sans-serif;font-size:26px;color:var(--accent)}.hide{display:none}.upload{display:block;background:var(--card);border:2px dashed #3d4a57;border-radius:12px;padding:30px;text-align:center;cursor:pointer}.upload input{display:none}@media(max-width:700px){.header{display:block}.brand h1{font-size:30px}}
</style></head><body><div class="app"><div class="header"><div class="brand"><h1>NOVA <span>Final View</span></h1><p class="muted">Read-only. Metrics are prepared by the admin app.</p></div><div id="badge" class="muted">No final output</div></div><div class="tabs"><button class="tab active" data-p="load">Load</button><button class="tab" data-p="overview">Office Overview</button><button class="tab" data-p="reps">Rep Roster</button><button class="tab" data-p="installs">Installs</button><button class="tab" data-p="payouts">Final Payouts</button></div><div id="load" class="page active"><label class="upload"><input id="finalFile" type="file" accept=".json"><h3>Upload Final Output JSON</h3><p class="muted">Normally embedded by admin publish.</p></label><div class="body"><button class="btn" onclick="loadDemo()">Load Demo</button><p id="status" class="muted">No file loaded.</p></div></div><div id="overview" class="page"><div class="stats"><div class="stat"><div class="label">Office Paid</div><div class="value" id="paid">$0</div></div><div class="stat"><div class="label">Revenue</div><div class="value" id="rev">$0</div></div><div class="stat"><div class="label">P/L</div><div class="value" id="pl">$0</div></div><div class="stat"><div class="label">Reps</div><div class="value" id="repsN">0</div></div></div></div><div id="reps" class="page"><div id="repGrid" class="rep-grid"></div><div id="repDetail" class="hide"><button class="btn" onclick="renderReps()">← Back</button><div class="card"><h3 id="repName"></h3><div style="overflow:auto"><table id="lineTable"><thead><tr><th>Source</th><th>Customer</th><th>Description</th><th>Paid</th><th>Revenue</th></tr></thead><tbody></tbody></table></div></div></div></div><div id="installs" class="page"><div class="card"><h3>Installs</h3><div style="overflow:auto"><table id="installTable"><thead><tr><th>Installed By</th><th>Date</th><th>Customer</th><th>Sales Rep</th><th>INT</th><th>NL</th><th>C2J</th></tr></thead><tbody></tbody></table></div></div></div><div id="payouts" class="page"><div class="card"><h3>Final Payout Entry List</h3><div style="overflow:auto"><table id="payoutTable"><thead><tr><th>Entered</th><th>Rep</th><th>Amount</th><th>Notes</th></tr></thead><tbody></tbody></table></div></div></div></div><script>
window.NOVA_FINAL=null;const DEMO={schema:'nova.finalOwnerView.v1',sessionId:'demo-final',office:'Nova Management Group',payPeriod:'04/20/2026 - 04/26/2026',officeTotals:{paid:655,revenue:510,pl:-162.4,repCount:4},reps:[{rep:'Cameron Grant',paid:480,revenue:0,pl:-537.6,lines:[{source:'Installs',customer:'Acme Plumbing',description:'Installer pay',paid:80,revenue:0},{source:'Admin',customer:'BASE WAGE',description:'Base wage',paid:300,revenue:0}]},{rep:'Tiernan Smith',paid:62.5,revenue:125,pl:70,lines:[{source:'DD',customer:'Acme Plumbing',description:'Remaining 50%',paid:62.5,revenue:125}]}],installs:[{installedBy:'Cameron Grant',date:'04/24/2026',customer:'Acme Plumbing',salesRep:'Tiernan Smith',INT:1,NL:2,C2J:0}],finalPayouts:[{rep:'Cameron Grant',amount:480,notes:'Includes base wage'},{rep:'Tiernan Smith',amount:62.5,notes:''}]};let data=null;const $=id=>document.getElementById(id);const money=n=>'$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.p).classList.add('active')});$('finalFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;loadFinal(JSON.parse(await f.text()))};function loadDemo(){loadFinal(DEMO)}function loadFinal(d){data=d;$('badge').textContent=(d.office||'Final')+' · '+(d.payPeriod||'');$('status').textContent='Loaded '+(d.sessionId||'final');renderAll()}function renderAll(){let t=data.officeTotals||{};$('paid').textContent=money(t.paid);$('rev').textContent=money(t.revenue);$('pl').textContent=money(t.pl);$('repsN').textContent=t.repCount||data.reps.length;renderReps();let tb=$('installTable').querySelector('tbody');tb.innerHTML='';(data.installs||[]).forEach(r=>tb.insertAdjacentHTML('beforeend',`<tr><td>${esc(r.installedBy)}</td><td>${esc(r.date)}</td><td>${esc(r.customer)}</td><td>${esc(r.salesRep)}</td><td>${r.INT||0}</td><td>${r.NL||0}</td><td>${r.C2J||0}</td></tr>`));let pb=$('payoutTable').querySelector('tbody');pb.innerHTML='';(data.finalPayouts||[]).forEach(p=>pb.insertAdjacentHTML('beforeend',`<tr><td><input type="checkbox"></td><td>${esc(p.rep)}</td><td>${money(p.amount)}</td><td>${esc(p.notes||'')}</td></tr>`))}function renderReps(){$('repDetail').classList.add('hide');$('repGrid').classList.remove('hide');$('repGrid').innerHTML='';(data?.reps||[]).forEach((r,i)=>$('repGrid').insertAdjacentHTML('beforeend',`<div class="rep-card" onclick="showRep(${i})"><div class="name">${esc(r.rep)}</div><div class="pay">${money(r.paid)}</div><div class="muted">Revenue ${money(r.revenue)} · P/L ${money(r.pl)}</div></div>`))}function showRep(i){let r=data.reps[i];$('repGrid').classList.add('hide');$('repDetail').classList.remove('hide');$('repName').textContent=r.rep;let tb=$('lineTable').querySelector('tbody');tb.innerHTML='';(r.lines||[]).forEach(l=>tb.insertAdjacentHTML('beforeend',`<tr><td>${esc(l.source)}</td><td>${esc(l.customer)}</td><td>${esc(l.description)}</td><td>${money(l.paid)}</td><td>${money(l.revenue)}</td></tr>`))}if(window.NOVA_FINAL)loadFinal(window.NOVA_FINAL);
</script></body></html>
